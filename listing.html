<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing | AglaOwner</title>
  <meta name="description" content="Listing details and direct buyer enquiry on AglaOwner.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body class="bg-slate-50 text-slate-900">
  <div data-page="listing">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-6 py-4">
        <a href="index.html" class="text-xl font-semibold tracking-tight text-slate-900">AglaOwner</a>
        <nav class="hidden items-center gap-6 text-sm font-medium text-slate-600 sm:flex">
          <a href="browse.html" class="hover:text-slate-900">Browse</a>
          <a href="privacy.html" class="hover:text-slate-900">Privacy</a>
          <a href="terms.html" class="hover:text-slate-900">Terms</a>
        </nav>
        <a data-seller-form-link href="index.html#list-business" class="inline-flex items-center rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white">List my business</a>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 py-10">
      <a href="browse.html" class="text-sm font-medium text-slate-500 hover:text-slate-900">← Back to browse</a>
      <div data-banner hidden class="mt-6"></div>
      <div class="mt-6 grid gap-8 xl:grid-cols-[1.2fr_0.8fr]">
        <section data-listing-detail></section>

        <aside>
          <form data-interest-form hidden novalidate class="rounded-3xl bg-white p-8 shadow-panel panel-ring">
            <p class="text-sm font-semibold uppercase tracking-wide text-orange-700">Direct buyer enquiry</p>
            <h2 class="mt-2 text-2xl font-semibold text-slate-900">Contact the owner</h2>
            <p class="mt-3 text-sm leading-6 text-slate-600">
              The seller gets your enquiry by email. Only direct buyers are allowed on the form.
            </p>

            <div class="mt-6 grid gap-4">
              <label class="text-sm font-medium text-slate-700">
                Full name
                <input name="fullName" required class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-slate-400">
                <span data-buyer-error-for="fullName" class="buyer-field-error" hidden></span>
              </label>
              <label class="text-sm font-medium text-slate-700">
                Mobile number
                <input name="mobile" required inputmode="tel" placeholder="9876543210" class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-slate-400">
                <span data-buyer-error-for="mobile" class="buyer-field-error" hidden></span>
              </label>
              <label class="text-sm font-medium text-slate-700">
                Email address
                <input name="email" type="email" class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-slate-400">
                <span data-buyer-error-for="email" class="buyer-field-error" hidden></span>
              </label>
              <label class="text-sm font-medium text-slate-700">
                Your city
                <input name="city" required class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-slate-400">
                <span data-buyer-error-for="city" class="buyer-field-error" hidden></span>
              </label>
              <label class="text-sm font-medium text-slate-700">
                Budget band
                <select name="budgetBand" class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400">
                  <option value="">Not shared</option>
                  <option>Below Rs 10L</option>
                  <option>Rs 10L - Rs 25L</option>
                  <option>Rs 25L - Rs 50L</option>
                  <option>Rs 50L - Rs 1Cr</option>
                  <option>Above Rs 1Cr</option>
                </select>
              </label>
              <label class="text-sm font-medium text-slate-700">
                Purchase timeframe
                <select name="purchaseTimeframe" class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400">
                  <option value="">Not shared</option>
                  <option>Within 30 days</option>
                  <option>1-3 months</option>
                  <option>3-6 months</option>
                  <option>Just exploring</option>
                </select>
              </label>
              <label class="text-sm font-medium text-slate-700">
                Message
                <textarea name="message" required rows="5" class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-slate-400" placeholder="Briefly explain your interest, background, and how soon you want to talk."></textarea>
                <span data-buyer-error-for="message" class="buyer-field-error" hidden></span>
              </label>
              <label class="text-sm font-medium text-slate-700">
                Broker declaration
                <select name="brokerDeclaration" required class="buyer-control mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400">
                  <option value="no">I am a direct buyer, not a broker</option>
                  <option value="yes">I am a broker or intermediary</option>
                </select>
                <span data-buyer-error-for="brokerDeclaration" class="buyer-field-error" hidden></span>
              </label>
            </div>

            <label class="buyer-consent mt-5 flex items-start gap-3 text-sm leading-6 text-slate-600">
              <input type="checkbox" name="buyerConsent" class="mt-1 h-4 w-4 rounded border-slate-300">
              <span>I consent to AglaOwner storing my enquiry and sending it to the seller. I can request deletion later via <a data-grievance-email href="mailto:privacy@aglaowner.in" class="font-medium text-slate-900">privacy@aglaowner.in</a>.</span>
            </label>
            <p data-buyer-error-for="buyerConsent" class="buyer-field-error mt-2" hidden></p>

            <button type="submit" class="mt-6 inline-flex w-full items-center justify-center rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Send enquiry</button>
          </form>
        </aside>
      </div>
    </main>
  </div>

  <footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-8 text-sm text-slate-500 sm:flex-row sm:items-center sm:justify-between">
      <p>© <span data-year></span> AglaOwner. Free during beta.</p>
      <div class="flex gap-4">
        <a href="privacy.html" class="hover:text-slate-900">Privacy</a>
        <a href="terms.html" class="hover:text-slate-900">Terms</a>
        <a data-support-email href="mailto:hello@aglaowner.in" class="hover:text-slate-900">Support</a>
      </div>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/config.js"></script>
  <script src="assets/demo-data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
