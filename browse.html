<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse listings | AglaOwner</title>
  <meta name="description" content="Browse reviewed business listings for sale across India.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body class="bg-slate-50 text-slate-900">
  <div data-page="browse">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-6 py-4">
        <a href="index.html" class="text-xl font-semibold tracking-tight text-slate-900">AglaOwner</a>
        <nav class="hidden items-center gap-6 text-sm font-medium text-slate-600 sm:flex">
          <a href="browse.html" class="text-slate-900">Browse</a>
          <a href="privacy.html" class="hover:text-slate-900">Privacy</a>
          <a href="terms.html" class="hover:text-slate-900">Terms</a>
        </nav>
        <a data-seller-form-link href="index.html#list-business" class="inline-flex items-center rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white">List my business</a>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 py-10">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-sm font-semibold uppercase tracking-wide text-orange-700">Live board</p>
          <h1 class="mt-2 text-3xl font-semibold tracking-tight text-slate-950">Reviewed owner listings</h1>
          <p class="mt-2 text-sm text-slate-600">Filter by city and category. Seller contact stays private until you submit an enquiry.</p>
        </div>
        <p data-results-meta class="text-sm font-medium text-slate-500"></p>
      </div>

      <div class="mt-8 grid gap-4 rounded-3xl bg-white p-5 shadow-panel panel-ring md:grid-cols-[1fr_1fr_auto]">
        <label class="text-sm font-medium text-slate-700">
          City
          <select data-filter-city class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none focus:border-slate-400">
            <option value="">All cities</option>
          </select>
        </label>
        <label class="text-sm font-medium text-slate-700">
          Category
          <select data-filter-category class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none focus:border-slate-400">
            <option value="">All categories</option>
          </select>
        </label>
        <div class="flex items-end">
          <a href="browse.html" class="inline-flex w-full items-center justify-center rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white">Reset</a>
        </div>
      </div>

      <div data-banner hidden class="mt-6"></div>

      <section data-listings class="mt-8 grid gap-6 lg:grid-cols-2"></section>

      <div data-pagination class="mt-8 flex flex-wrap gap-3"></div>
    </main>

    <footer class="border-t border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-8 text-sm text-slate-500 sm:flex-row sm:items-center sm:justify-between">
        <p>© <span data-year></span> AglaOwner. Free during beta.</p>
        <div class="flex gap-4">
          <a href="privacy.html" class="hover:text-slate-900">Privacy</a>
          <a href="terms.html" class="hover:text-slate-900">Terms</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/config.js"></script>
  <script src="assets/demo-data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
