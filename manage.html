<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage listing | AglaOwner</title>
  <meta name="description" content="Owner controls for AglaOwner listings.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body class="bg-slate-50 text-slate-900">
  <div data-page="manage">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-6 py-4">
        <a href="index.html" class="text-xl font-semibold tracking-tight text-slate-900">AglaOwner</a>
        <p class="text-sm font-medium text-slate-500">Seller dashboard</p>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 py-10">
      <div data-banner hidden class="mb-6"></div>
      <section data-owner-detail></section>

      <section data-owner-actions hidden class="mt-8 rounded-3xl bg-white p-6 shadow-panel panel-ring">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <h2 class="text-lg font-semibold text-slate-900">Listing actions</h2>
          <a data-owner-public-link hidden href="#" class="inline-flex items-center rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 hover:bg-white">View public listing</a>
        </div>
        <div class="mt-4 flex flex-wrap gap-3">
          <button data-owner-action="SOLD" class="rounded-full bg-emerald-600 px-5 py-3 text-sm font-semibold text-white">Mark sold</button>
          <button data-owner-action="PAUSE" class="rounded-full bg-amber-500 px-5 py-3 text-sm font-semibold text-white">Pause listing</button>
          <button data-owner-action="RENEW" class="rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Renew 90 days</button>
        </div>
      </section>

      <section class="mt-8">
        <div class="flex items-center justify-between gap-4">
          <h2 class="text-2xl font-semibold text-slate-900">Recent enquiries</h2>
          <p class="text-sm text-slate-500">Delivered to the seller email on file.</p>
        </div>
        <div data-owner-leads class="mt-4 grid gap-4"></div>
      </section>
    </main>
  </div>

  <footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-8 text-sm text-slate-500 sm:flex-row sm:items-center sm:justify-between">
      <p>© <span data-year></span> AglaOwner. Free during beta.</p>
      <div class="flex gap-4">
        <a href="privacy.html" class="hover:text-slate-900">Privacy</a>
        <a href="terms.html" class="hover:text-slate-900">Terms</a>
        <a data-support-email href="mailto:hello@aglaowner.in" class="hover:text-slate-900">Support</a>
      </div>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/config.js"></script>
  <script src="assets/demo-data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
